<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 60px 16px;
    }

    .card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 16px rgba(0,0,0,0.08);
      width: 100%;
      max-width: 480px;
      padding: 32px;
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 4px;
    }

    .subtitle {
      font-size: 13px;
      color: #888;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: #5b5bf6; }

    button.add-btn {
      padding: 10px 18px;
      background: #5b5bf6;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }

    button.add-btn:hover { background: #4646e0; }

    .todo-list { list-style: none; }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid #f0f0f0;
      animation: fadeIn 0.2s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; } }

    .todo-item:last-child { border-bottom: none; }

    .todo-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: #5b5bf6;
      cursor: pointer;
      flex-shrink: 0;
    }

    .todo-title {
      flex: 1;
      font-size: 15px;
      color: #2d2d2d;
      transition: all 0.15s;
    }

    .todo-title.done {
      text-decoration: line-through;
      color: #aaa;
    }

    .del-btn {
      background: none;
      border: none;
      color: #ccc;
      font-size: 18px;
      cursor: pointer;
      line-height: 1;
      padding: 2px 4px;
      border-radius: 4px;
      transition: color 0.15s;
    }

    .del-btn:hover { color: #e05555; }

    .empty {
      text-align: center;
      color: #bbb;
      font-size: 14px;
      padding: 32px 0;
    }

    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid #f0f0f0;
      font-size: 12px;
      color: #999;
    }

    .api-url {
      font-family: monospace;
      font-size: 11px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Todos</h1>
    <p class="subtitle">Deployed via Jenkins → Docker → Kubernetes</p>

    <div class="input-row">
      <input type="text" id="todo-input" placeholder="Add a new task..." />
      <button class="add-btn" onclick="addTodo()">Add</button>
    </div>

    <ul class="todo-list" id="todo-list">
      <li class="empty" id="empty-msg">No todos yet. Add one above!</li>
    </ul>

    <div class="status-bar">
      <span id="count-label">0 items</span>
      <span class="api-url" id="api-label"></span>
    </div>
  </div>

  <script>
    const API = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:8080/todos'
      : '/api/todos';

    document.getElementById('api-label').textContent = API;
    document.getElementById('todo-input').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    async function fetchTodos() {
      const res = await fetch(API);
      const todos = await res.json();
      render(todos);
    }

    async function addTodo() {
      const input = document.getElementById('todo-input');
      const title = input.value.trim();
      if (!title) return;
      await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title })
      });
      input.value = '';
      fetchTodos();
    }

    async function toggleTodo(id) {
      await fetch(`${API}/${id}`, { method: 'PATCH' });
      fetchTodos();
    }

    async function deleteTodo(id) {
      await fetch(`${API}/${id}`, { method: 'DELETE' });
      fetchTodos();
    }

    function render(todos) {
      const list = document.getElementById('todo-list');
      const empty = document.getElementById('empty-msg');
      const count = document.getElementById('count-label');

      if (todos.length === 0) {
        list.innerHTML = '';
        list.appendChild(empty);
        count.textContent = '0 items';
        return;
      }

      list.innerHTML = todos.map(t => `
        <li class="todo-item">
          <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="toggleTodo(${t.id})"/>
          <span class="todo-title ${t.completed ? 'done' : ''}">${escHtml(t.title)}</span>
          <button class="del-btn" onclick="deleteTodo(${t.id})">×</button>
        </li>
      `).join('');

      const done = todos.filter(t => t.completed).length;
      count.textContent = `${todos.length} item${todos.length !== 1 ? 's' : ''} · ${done} done`;
    }

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    fetchTodos();
  </script>
</body>
</html>
